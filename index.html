<!DOCTYPE html>
<html lang="zh-TW">
<head>
<!-- ================= 網頁 Icon & 手機 App 圖示設定 ================= -->
<!-- 1. 標準電腦瀏覽器分頁圖示 -->
<link rel="icon" type="image/x-icon" href="favicon.ico">

<!-- 2. Apple iOS (iPhone/iPad) 加到主畫面圖示 -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- 3. Android (Chrome) 與一般 PWA 應用的圖示 -->
<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

<!-- 4. 設定 iOS 手機頂部狀態列的顏色 (讓網頁跟手機系統完美融合) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生活足跡隨身手記</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Serif TC & Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind Custom Config for Aesthetic Literary Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        diary: {
                            bg: '#f8f6f0',       // 燕麥奶暖白底色
                            card: '#ffffff',     // 純白卡片
                            primary: '#5c6e58',  // 溫潤鼠尾草綠
                            secondary: '#c97a7a',// 復古煙粉/暖磚紅
                            accent: '#d2a477',   // 暖色溫木質調
                            text: '#3c3836',     // 深炭灰
                            light: '#e8e5dc',    // 柔軟米灰
                        }
                    },
                    fontFamily: {
                        serif: ['Noto Serif TC', 'Georgia', 'serif'],
                        sans: ['Lora', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        soft: '0 8px 30px rgb(92, 110, 88, 0.04)',
                        floating: '0 12px 40px rgb(60, 56, 54, 0.12)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Lora', 'Noto Serif TC', Georgia, serif;
            background-color: #efede6;
            color: #3c3836;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏滾動條但保持滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 細緻的手帳虛線 */
        .dashed-border {
            background-image: linear-gradient(to right, #e8e5dc 50%, rgba(255, 255, 255, 0) 0%);
            background-position: bottom;
            background-size: 8px 1px;
            background-repeat: repeat-x;
            height: 1px;
        }

        /* 動畫過渡 */
        .modal-overlay {
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-content {
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1), opacity 0.35s ease;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <!-- APP 模式模擬框架 (在桌面上限制寬度，在手機上全螢幕) -->
    <div class="w-full max-w-md h-screen bg-diary-bg relative flex flex-col shadow-floating overflow-hidden sm:rounded-[36px] sm:h-[850px] border border-stone-200/40">
        
        <!-- 頂部精緻 Header -->
        <header class="pt-7 pb-4 px-6 bg-diary-bg shrink-0">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <span class="text-xs font-sans tracking-widest text-diary-accent font-bold uppercase">Our Footprints</span>
                    <h1 class="text-2xl font-serif font-black text-diary-text mt-0.5">生活足跡手札</h1>
                </div>
                <div class="w-10 h-10 rounded-full bg-diary-card flex items-center justify-center text-diary-primary border border-diary-light/60 shadow-soft">
                    <i class="fa-solid fa-feather-pointed"></i>
                </div>
            </div>

            <!-- 搜尋與排序欄 -->
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-stone-400 text-sm">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋記憶、地點或備註..." 
                           class="w-full pl-9 pr-4 py-2.5 bg-diary-card border border-diary-light/80 rounded-2xl text-xs font-serif focus:outline-none focus:border-diary-primary/60 placeholder-stone-400 shadow-soft transition-colors">
                </div>
                <div class="relative shrink-0">
                    <select id="sortSelect" onchange="handleSortChange()" 
                            class="h-10 pl-3 pr-8 bg-diary-card border border-diary-light/80 rounded-2xl text-[11px] font-serif font-bold text-diary-text/70 focus:outline-none focus:border-diary-primary/60 shadow-soft appearance-none transition-all cursor-pointer">
                        <option value="newest">最新</option>
                        <option value="oldest">最舊</option>
                        <option value="region">依地區</option>
                        <option value="category">分類</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none text-[9px]"></i>
                </div>
            </div>
        </header>

        <!-- 手札內容列表滾動區 -->
        <main class="flex-1 overflow-y-auto px-6 pb-28 no-scrollbar" id="itemsList">
            <!-- 動態生成的小卡片將放置在此 -->
        </main>

        <!-- 右下角懸浮新增按鈕 (FAB) -->
        <button onclick="openEditModal()" class="fixed sm:absolute bottom-24 right-6 w-14 h-14 bg-diary-primary text-white rounded-full flex items-center justify-center shadow-floating hover:scale-105 active:scale-95 transition-all z-40">
            <i class="fa-solid fa-plus text-xl"></i>
        </button>

        <!-- 底部 APP 模式分類導覽列 -->
        <nav class="absolute bottom-0 left-0 right-0 h-20 bg-diary-card border-t border-diary-light/50 flex justify-around items-center px-4 z-40 shadow-floating sm:rounded-b-[36px]">
            <button onclick="changeCategoryFilter('All')" class="nav-item flex flex-col items-center gap-1 text-diary-primary" id="nav-All">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-lg transition-all"><i class="fa-solid fa-seedling"></i></div>
                <span class="text-[10px] font-serif font-bold tracking-wider">全部</span>
            </button>
            <button onclick="changeCategoryFilter('展覽')" class="nav-item flex flex-col items-center gap-1 text-stone-400" id="nav-展覽">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-lg transition-all"><i class="fa-solid fa-palette"></i></div>
                <span class="text-[10px] font-serif font-bold tracking-wider">展覽</span>
            </button>
            <button onclick="changeCategoryFilter('景點')" class="nav-item flex flex-col items-center gap-1 text-stone-400" id="nav-景點">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-lg transition-all"><i class="fa-solid fa-mountain-sun"></i></div>
                <span class="text-[10px] font-serif font-bold tracking-wider">景點</span>
            </button>
            <button onclick="changeCategoryFilter('美食')" class="nav-item flex flex-col items-center gap-1 text-stone-400" id="nav-美食">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-lg transition-all"><i class="fa-solid fa-utensils"></i></div>
                <span class="text-[10px] font-serif font-bold tracking-wider">美食</span>
            </button>
            <button onclick="changeCategoryFilter('店家')" class="nav-item flex flex-col items-center gap-1 text-stone-400" id="nav-店家">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-lg transition-all"><i class="fa-solid fa-store"></i></div>
                <span class="text-[10px] font-serif font-bold tracking-wider">店家</span>
            </button>
        </nav>
    </div>

    <!-- 1. 下一層詳細手記 Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 flex justify-center items-end sm:items-center hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-sm modal-overlay opacity-0" onclick="closeDetailModal()"></div>
        
        <!-- Drawer Content -->
        <div class="bg-diary-bg w-full max-w-md h-[80vh] sm:h-auto sm:max-h-[85vh] rounded-t-[32px] sm:rounded-[32px] shadow-floating relative z-10 flex flex-col modal-content translate-y-full sm:translate-y-10 sm:opacity-0 overflow-hidden">
            
            <!-- Mobile Swipe Indicator -->
            <div class="w-full flex justify-center pt-3 pb-1 sm:hidden cursor-pointer" onclick="closeDetailModal()">
                <div class="w-12 h-1.5 bg-diary-light rounded-full"></div>
            </div>

            <!-- Compact Header (已移除贅餘空白) -->
            <div class="px-6 py-4 border-b border-diary-light/60 flex justify-between items-center shrink-0 bg-white shadow-soft">
                <div class="flex items-center gap-3">
                    <div id="detailCategoryIcon" class="w-10 h-10 bg-diary-primary/10 rounded-xl flex items-center justify-center text-lg text-diary-primary border border-diary-primary/20">
                        <!-- Icon Injected by JS -->
                    </div>
                    <div>
                        <span id="detailCategoryTag" class="text-[10px] font-serif font-bold text-diary-secondary tracking-widest uppercase block mb-0.5"></span>
                        <h2 id="detailTitle" class="text-base font-serif font-bold text-diary-text leading-snug line-clamp-1"></h2>
                    </div>
                </div>
                <button onclick="closeDetailModal()" class="w-8 h-8 rounded-full bg-diary-bg flex items-center justify-center text-diary-text/60 hover:bg-diary-light transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto p-6 space-y-5 no-scrollbar" id="detailDynamicContent">
                <!-- Template Injected by JS based on Category -->
            </div>

            <!-- Bottom Operation Action Panel -->
            <div class="p-5 border-t border-diary-light/60 bg-white flex justify-between gap-3 shrink-0 rounded-b-[32px]">
                <button id="detailDeleteBtn" class="flex-1 py-3 bg-red-50 hover:bg-red-100 text-diary-secondary font-serif text-sm font-bold rounded-2xl border border-red-100 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-trash-can"></i> 撕去此頁
                </button>
                <button id="detailEditBtn" class="flex-1 py-3 bg-diary-primary hover:bg-diary-primary/90 text-white font-serif text-sm font-bold rounded-2xl shadow-soft transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-pen-fancy"></i> 編修此章
                </button>
            </div>
        </div>
    </div>

    <!-- 2. 新增與編修手記 Modal -->
    <div id="editModal" class="fixed inset-0 z-50 flex justify-center items-end sm:items-center hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-sm modal-overlay opacity-0" onclick="closeEditModal()"></div>
        
        <!-- Form Content -->
        <div class="bg-diary-bg w-full max-w-md h-[88vh] sm:h-auto sm:max-h-[90vh] rounded-t-[32px] sm:rounded-[32px] shadow-floating relative z-10 flex flex-col modal-content translate-y-full sm:translate-y-10 sm:opacity-0 overflow-hidden">
            
            <div class="w-full flex justify-center pt-3 pb-1 sm:hidden cursor-pointer" onclick="closeEditModal()">
                <div class="w-12 h-1.5 bg-diary-light rounded-full"></div>
            </div>

            <!-- Header -->
            <div class="px-6 py-4 border-b border-diary-light/60 flex justify-between items-center bg-white shadow-soft shrink-0">
                <h2 id="modalTitle" class="text-lg font-serif font-black text-diary-text">撰寫新手記</h2>
                <button onclick="closeEditModal()" class="w-8 h-8 rounded-full bg-diary-bg flex items-center justify-center text-diary-text/60 hover:bg-diary-light transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Form Fields -->
            <div class="flex-1 overflow-y-auto p-6 space-y-5 no-scrollbar">
                <input type="hidden" id="itemId">

                <!-- 名稱 (Title) -->
                <div>
                    <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5 ml-1">名稱 / 標題</label>
                    <input type="text" id="itemTitle" placeholder="如：塩埕珈琲館、印象派大師展" 
                           class="w-full border border-diary-light bg-white rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-diary-primary focus:ring-1 focus:ring-diary-primary transition-colors">
                </div>

                <!-- 分頁 (Category Select) -->
                <div>
                    <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5 ml-1">分類手帳</label>
                    <div class="relative">
                        <select id="itemCategory" onchange="updateFormFieldsVisibility()" 
                                class="w-full border border-diary-light bg-white rounded-2xl px-4 py-3 text-sm appearance-none focus:outline-none focus:border-diary-primary transition-colors">
                            <option value="展覽">展覽</option>
                            <option value="景點">景點</option>
                            <option value="美食">美食</option>
                            <option value="店家">店家</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none text-xs"></i>
                    </div>
                </div>

                <!-- 展覽 (Exhibition) 專屬欄位組 -->
                <div id="exhibitionFields" class="space-y-4 hidden bg-white/60 p-4 rounded-2xl border border-diary-light/60">
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">地區</label>
                        <div class="relative">
                            <select id="exhibitionRegion" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs appearance-none">
                                <option value="台北">台北</option>
                                <option value="新北">新北</option>
                                <option value="高雄">高雄</option>
                                <option value="台南">台南</option>
                                <option value="屏東">屏東</option>
                                <option value="嘉義">嘉義</option>
                                <option value="台中">台中</option>
                                <option value="基隆">基隆</option>
                                <option value="桃園">桃園</option>
                                <option value="新竹">新竹</option>
                                <option value="苗栗">苗栗</option>
                                <option value="彰化">彰化</option>
                                <option value="南投">南投</option>
                                <option value="雲林">雲林</option>
                                <option value="宜蘭">宜蘭</option>
                                <option value="花蓮">花蓮</option>
                                <option value="台東">台東</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3.5 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none text-xs"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">地點</label>
                        <input type="text" id="exhibitionLocation" placeholder="如：台北市立美術館" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">地址</label>
                        <input type="text" id="exhibitionAddress" placeholder="如：台北市中山區中山北路三段181號" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">開始日期</label>
                            <input type="date" id="exhibitionStartDate" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">結束日期</label>
                            <input type="date" id="exhibitionEndDate" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">營業時間</label>
                        <input type="text" id="exhibitionTime" placeholder="如：09:30 - 17:30 (週一休館)" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">門票</label>
                        <input type="text" id="exhibitionTicket" placeholder="如：全票 150 元 / 優待票 100 元" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">影片</label>
                        <input type="url" id="exhibitionVideo" placeholder="選填影片連結 (YouTube/Vimeo)" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">備註</label>
                        <textarea id="exhibitionNotes" rows="3" placeholder="留下您的感想或看展備忘錄..." class="w-full border border-diary-light bg-white rounded-xl p-3.5 text-xs focus:outline-none"></textarea>
                    </div>
                </div>

                <!-- 景點 (Attraction) 專屬欄位組 -->
                <div id="attractionFields" class="space-y-4 hidden bg-white/60 p-4 rounded-2xl border border-diary-light/60">
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">地區</label>
                        <div class="relative">
                            <select id="attractionRegion" onchange="handleAttractionRegionChange()" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs appearance-none">
                                <option value="基隆">基隆</option>
                                <option value="台北">台北</option>
                                <option value="新北">新北</option>
                                <option value="桃園">桃園</option>
                                <option value="新竹">新竹</option>
                                <option value="苗栗">苗栗</option>
                                <option value="彰化">彰化</option>
                                <option value="台中">台中</option>
                                <option value="南投">南投</option>
                                <option value="雲林">雲林</option>
                                <option value="嘉義">嘉義</option>
                                <option value="台南">台南</option>
                                <option value="高雄">高雄</option>
                                <option value="屏東">屏東</option>
                                <option value="台東">台東</option>
                                <option value="花蓮">花蓮</option>
                                <option value="宜蘭">宜蘭</option>
                                <option value="澎湖">澎湖</option>
                                <option value="金門">金門</option>
                                <option value="國外">國外</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3.5 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none text-xs"></i>
                        </div>
                    </div>
                    <!-- 國外延伸選單 -->
                    <div id="attractionForeignContainer" class="hidden">
                        <label class="block text-xs font-serif font-bold text-diary-accent mb-1.5">國外細分地區</label>
                        <div class="relative">
                            <select id="attractionRegionForeign" class="w-full border border-diary-accent/40 bg-white rounded-xl px-3.5 py-2.5 text-xs appearance-none">
                                <option value="日本">日本</option>
                                <option value="港澳">港澳</option>
                                <option value="新加坡">新加坡</option>
                                <option value="馬來西亞">馬來西亞</option>
                                <option value="其他">其他</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3.5 top-1/2 -translate-y-1/2 text-diary-accent pointer-events-none text-xs"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">地址</label>
                        <input type="text" id="attractionAddress" placeholder="輸入地址一鍵生成地圖" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">營業時間</label>
                        <input type="text" id="attractionTime" placeholder="如：24小時開放、08:00 - 17:00" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">門票</label>
                        <input type="text" id="attractionTicket" placeholder="如：免費 / 入園費 200 元" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">影片</label>
                        <input type="url" id="attractionVideo" placeholder="可貼上影片宣傳連結" class="w-full border border-diary-light bg-white rounded-xl px-3.5 py-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-serif font-bold text-diary-text/70 mb-1.5">備註</label>
                        <textarea id="attractionNotes" rows="3" placeholder="寫些關於此地的小回憶或旅人指引..." class="w-full border border-diary-light bg-white rounded-xl p-3.5 text-xs focus:outline-none"></textarea>
                    </div>
                </div>

                <!-- 美食 (Food) 專屬欄位組 -->
                <div id="foodFields" class="space-y-4 hidden bg-white/60 p-4 rounded-2xl border border-diary-light/60">
                    <!-- 美食 總類下拉選單 -->
                    <div>

    <script>
       // ==========================================================
// 🛡️ 狀態宣告 (State) - 升級為純雲端，斷開本機殭屍快取
// ==========================================================
let items = []; // 初始化為乾淨的空陣列
let currentFilter = 'All'; // 'All' | '展覽' | '景點' | '美食' | '店家'
let itemToDelete = null;   // 當前選取欲刪除項目之 ID
let currentSort = 'newest'; // 預設：最新最前 'newest'

// ==========================================================
// 🚀 核心大腦：去 Render 幫 items 變數注入 Notion 活資料（欄位分家完美版）
// ==========================================================
// ==========================================================
// 🚀 核心大腦：去 Render 幫 items 變數注入 Notion 活資料
// ==========================================================
async function loadNotionCloudData() {
    try {
        console.log("🎬 開始與 Notion 雲端同步...");
        
        const response = await fetch('https://fourbox.onrender.com/api/notion');
        const result = await response.json();
        
        if (result.success && result.data) {
            console.log("📥 成功從雲端撈回資料:", result.data);
            
            // 🎯 【黑客遮眼過濾網】只要不是 'deleted' 的卡片就放行
            const activeData = result.data.filter(item => item.status !== 'deleted');

            // 2. 翻譯並填入 items (讓日期與營業時間各自獨立，不再打架！)
            items = activeData.map(item => {
                return {
                    id: item.id,
                    title: item.title,
                    category: item.category === '未分類' ? '展覽' : item.category, 
                    status: item.status || 'normal', 
                    
                    // 📅 讓開始與結束日期獨立出來
                    startDate: item.startDate || '',
                    endDate: item.endDate || '',
                    
                    // 🎯 各就各位：所有 Time 欄位乖乖放原始的營業時間（item.time）！
                    exhibitionRegion: item.region, 
                    exhibitionLocation: item.notes, 
                    exhibitionAddress: item.address, 
                    exhibitionTime: item.time || '未註記', 
                    exhibitionTicket: item.ticket, 
                    exhibitionNotes: item.notes,
                    
                    attractionRegion: item.region, 
                    attractionAddress: item.address, 
                    attractionTime: item.time || '24小時開放', 
                    attractionTicket: item.ticket, 
                    attractionNotes: item.notes,
                    
                    foodType: item.foodType || '其他', 
                    foodRegion: item.region, 
                    foodAddress: item.address, 
                    foodTime: item.time || '無資料', 
                    foodClosed: item.holiday, 
                    foodNotes: item.notes,
                    
                    storeRegion: item.region, 
                    storeAddress: item.address, 
                    storeTime: item.time || '無資料', 
                    storeClosed: item.holiday, 
                    storeNotes: item.notes,
                    
                    timestamp: Date.now() 
                };
            }); // 👈 map 的結尾

            localStorage.clear();

            if (typeof renderItems === 'function') {
                renderItems(); 
                console.log("🎉 雲端卡片已透過原本的排版引擎完美畫在畫面上！");
            }
        } // 👈 if 的結尾
    } catch (error) {
        console.error("❌ 雲端讀取發生錯誤:", error);
    } // 👈 catch 的結尾
} // 👈 loadNotionCloudData 函數的完美總結尾，絕不多也不少！

        // --- 核心儲存功能 (Core Database Sync) ---
function saveToLocal() {
    localStorage.setItem('lifelog_items', JSON.stringify(items));
}

// --- 篩選與搜尋重繪 (Filtering & Render) ---
function changeCategoryFilter(cat) {
    currentFilter = cat;
    
    // 更新底部導覽高亮
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.remove('text-diary-primary');
        btn.classList.add('text-stone-400');
    });
    const activeNav = document.getElementById(`nav-${cat}`);
    if (activeNav) {
        activeNav.classList.remove('text-stone-400');
        activeNav.classList.add('text-diary-primary');
    }

    renderItems();
}

function handleSearch() {
    renderItems();
}

function handleSortChange() {
    currentSort = document.getElementById('sortSelect').value;
    
    let toastMsg = "手札排序：最新";
    if (currentSort === 'oldest') {
        toastMsg = "手札排序：最舊";
    } else if (currentSort === 'region') {
        toastMsg = "手札排序：依地區排序";
    } else if (currentSort === 'category') {
        toastMsg = "手札排序：依分類排序";
    }
    
    showToast(toastMsg);
    renderItems();
}

// 智慧提取各種類別的地區資訊，方便統一排序
function getItemRegion(item) {
    if (item.category === '展覽') {
        return item.exhibitionLocation ? item.exhibitionLocation : (item.exhibitionRegion || '');
    } else if (item.category === '景點') {
        return (item.attractionRegion === '國外' && item.attractionRegionSub) ? item.attractionRegionSub : (item.attractionRegion || '');
    } else if (item.category === '美食') {
        return (item.foodRegion === '高雄' || item.foodRegion === '國外') && item.foodRegionSub ? item.foodRegionSub : (item.foodRegion || '');
    } else {
        return (item.storeRegion === '國外' && item.storeRegionSub) ? item.storeRegionSub : (item.storeRegion || '');
    }
}

function renderItems() {
    const container = document.getElementById('itemsList');
    if (!container) return;
    container.innerHTML = '';

    // 1. 類別過濾
    let filtered = items;
    if (currentFilter !== 'All') {
        filtered = items.filter(item => item.category === currentFilter);
    }

    // 3. 排序 (時間由新到舊、時間由舊到新、依地區中文排序、依分類手帳排序)
    if (currentSort === 'newest') {
        filtered.sort((a, b) => b.timestamp - a.timestamp);
    } else if (currentSort === 'oldest') {
        filtered.sort((a, b) => a.timestamp - b.timestamp);
    } else if (currentSort === 'region') {
        filtered.sort((a, b) => {
            const regA = getItemRegion(a);
            const regB = getItemRegion(b);
            return regA.localeCompare(regB, 'zh-Hant');
        });
    } else if (currentSort === 'category') {
        const catOrder = { '展覽': 1, '景點': 2, '美食': 3, '店家': 4 };
        filtered.sort((a, b) => {
            const orderA = catOrder[a.category] || 99;
            const orderB = catOrder[b.category] || 99;
            if (orderA !== orderB) {
                return orderA - orderB;
            }
            return b.timestamp - a.timestamp;
        });
    }

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 text-center">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-stone-300 border border-diary-light/40 mb-3 shadow-soft">
                    <i class="fa-solid fa-wind text-xl"></i>
                </div>
                <h3 class="font-serif font-bold text-stone-400 text-sm">這兒還是一張白紙</h3>
                <p class="text-[11px] text-stone-400 font-serif mt-1">點擊右下角按鈕寫下新的足跡記憶</p>
            </div>
        `;
        return;
    }

    filtered.forEach(item => {
        const card = createCardElement(item);
        container.appendChild(card);
    });
}

// ==========================================================
// 🎨 【大歸位】小卡片排版引擎（把漏掉的函數大門重新裝上！）
// ==========================================================
function createCardElement(item) {
    const div = document.createElement('div');
    
    if (item.status === 'archived') {
        div.className = 'diary-card bg-stone-100 border border-stone-200/60 opacity-70 relative';
    } else {
        div.className = 'diary-card bg-white border border-stone-200/60 shadow-sm relative';
    }

    let badgeText = getItemRegion(item) || '台北';

    const headerArea = `
        <div class="flex justify-between items-start mb-2.5">
            <div>
                <span class="inline-block bg-diary-accent/10 text-diary-accent text-[9px] px-2 py-0.5 rounded-full font-sans font-medium mb-1">${item.category} · ${badgeText}</span>
                <h3 class="text-xs font-serif font-bold text-stone-800 leading-tight tracking-wide">${item.title}</h3>
            </div>
            <div class="flex gap-1.5 ml-2 pt-0.5">
                <button onclick="openDetailModal('${item.id}')" class="text-stone-400 hover:text-stone-600 transition-colors p-1" title="閱讀詳細">
                    <i class="fa-regular fa-eye text-[11px]"></i>
                </button>
                <button onclick="openEditModal('${item.id}')" class="text-stone-400 hover:text-diary-accent transition-colors p-1" title="編修此章">
                    <i class="fa-regular fa-pen-to-square text-[11px]"></i>
                </button>
            </div>
        </div>
    `;

    let bodyContent = '';

    if (item.category === '展覽') {
        bodyContent = `
            <div class="bg-diary-bg/40 rounded-2xl p-3.5 text-[11px] font-serif text-stone-600 space-y-1.5 border border-stone-100">
                <div class="flex items-center gap-2"><i class="fa-solid fa-location-dot w-4 text-stone-400 text-center"></i>地點：${item.exhibitionLocation || '-'}</div>
                ${(item.startDate || item.endDate) ? `
                <div class="flex items-center gap-2 text-diary-accent font-bold"><i class="fa-regular fa-calendar w-4 text-stone-400 text-center"></i>展期：${item.startDate || '?'} ~ ${item.endDate || '?'}</div>
                ` : ''}

}

} // 👈 openDetailModal 的完美大門關閉！

function closeDetailModal() {
    const modal = document.getElementById('detailModal');
    if (!modal || modal.classList.contains('hidden')) return;

    const overlay = modal.querySelector('.modal-overlay');
    const content = modal.querySelector('.modal-content');

    if (overlay) overlay.classList.add('opacity-0');
    if (content) content.classList.add('translate-y-full', 'sm:translate-y-10', 'sm:opacity-0');

    setTimeout(() => {
        modal.classList.add('hidden');
    }, 300);
}

// --- Toast 提示功能 ---
function showToast(msg) {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');
    if (!toast || !toastMsg) return;

    toastMsg.textContent = msg;
    toast.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
    
    setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-2', 'pointer-events-none');
    }, 2500);
}
