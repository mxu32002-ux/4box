<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJ百寶任意門</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 展覽主題：大地拿鐵色 */
            --theme-bg: #fdfbf7;
            --theme-card: #f4efe9;
            --theme-primary: #8e7f72;
            --theme-primary-hover: #7a6c60;
            --theme-text: #5c544d;
            --theme-text-light: #9e9185;
            --theme-border: #e0d8cf;
            --theme-shadow: rgba(142, 127, 114, 0.1);
        }

        body.theme-spot {
            /* 景點主題：鼠尾草綠 */
            --theme-bg: #f4f7f4;
            --theme-card: #e9ece9;
            --theme-primary: #6b8e72;
            --theme-primary-hover: #55755b;
            --theme-text: #465749;
            --theme-text-light: #809984;
            --theme-border: #d0dcd2;
            --theme-shadow: rgba(107, 142, 114, 0.1);
        }

        body.theme-food {
            /* 美食主題：焦糖奶油色 */
            --theme-bg: #fefcf8;
            --theme-card: #f9f1e7;
            --theme-primary: #c48c5a;
            --theme-primary-hover: #a67347;
            --theme-text: #5c4736;
            --theme-text-light: #9e8571;
            --theme-border: #e8dccb;
            --theme-shadow: rgba(196, 140, 90, 0.1);
        }

        body.theme-store {
            /* 店家主題：文青藍 */
            --theme-bg: #f5f8fa;
            --theme-card: #e9f0f5;
            --theme-primary: #5a82a6;
            --theme-primary-hover: #4a6a8a;
            --theme-text: #364a5c;
            --theme-text-light: #71889e;
            --theme-border: #cbdce8;
            --theme-shadow: rgba(90, 130, 166, 0.1);
        }

        .t-bg { background-color: var(--theme-bg); transition: all 0.4s ease; }
        .t-card { background-color: var(--theme-card); transition: all 0.4s ease, border-color 0.4s ease; box-shadow: 0 4px 20px var(--theme-shadow); }
        .t-text { color: var(--theme-text); transition: color 0.4s ease; }
        .t-text-light { color: var(--theme-text-light); transition: color 0.4s ease; }
        .t-primary { background-color: var(--theme-primary); color: #fff; transition: all 0.4s ease; }
        .t-primary:hover { background-color: var(--theme-primary-hover); }
        .t-primary-text { color: var(--theme-primary); transition: color 0.4s ease; }
        .t-border { border-color: var(--theme-border); transition: border-color 0.4s ease; }
        .t-ring:focus { outline: none; box-shadow: 0 0 0 2px var(--theme-primary); }
        
        .custom-select {
            appearance: none;
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1.5em 1.5em;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="%238e7f72"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>');
        }
        body.theme-spot .custom-select { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="%236b8e72"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>'); }
        body.theme-food .custom-select { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="%23c48c5a"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>'); }
        body.theme-store .custom-select { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="%235a82a6"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>'); }

        body { font-family: 'Noto Serif TC', 'Noto Sans TC', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="t-bg min-h-screen t-text">

    <div class="max-w-2xl mx-auto p-6 md:p-8">
        
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold tracking-widest t-primary-text mb-6">SJ百寶任意門</h1>
            <div class="inline-flex t-card rounded-full p-1 border t-border overflow-x-auto no-scrollbar max-w-full">
                <button id="tab-cover" class="whitespace-nowrap px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 t-text-light hover:t-text" onclick="switchMainTab('cover')">封面</button>
                <button id="tab-exh" class="whitespace-nowrap px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 t-text-light hover:t-text" onclick="switchMainTab('exh')">展覽</button>
                <button id="tab-spot" class="whitespace-nowrap px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 t-text-light hover:t-text" onclick="switchMainTab('spot')">景點</button>
                <button id="tab-food" class="whitespace-nowrap px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 t-text-light hover:t-text" onclick="switchMainTab('food')">美食</button>
                <button id="tab-store" class="whitespace-nowrap px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 t-text-light hover:t-text" onclick="switchMainTab('store')">店家</button>
            </div>
        </header>

        <!-- ==================== 0. 封面區塊 (Cover) ==================== -->
        <div id="section-cover" class="hidden">
            <div class="text-center py-8 md:py-16 animate-in fade-in duration-700">
                <div class="inline-block p-4 rounded-full t-card mb-6 shadow-sm border t-border">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10 t-primary-text">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" />
                    </svg>
                </div>
                <h2 class="text-3xl md:text-4xl font-bold font-serif t-primary-text mb-4 tracking-widest">歡迎開啟任意門</h2>
                <p class="t-text-light mb-12 text-sm md:text-base tracking-wide">專屬於您的生活與品味紀錄庫</p>
                
                <div class="grid grid-cols-2 gap-4 md:gap-6 max-w-lg mx-auto">
                    <div class="t-card rounded-3xl p-6 border t-border cursor-pointer hover:-translate-y-1 transition-transform shadow-sm flex flex-col items-center" onclick="switchMainTab('exh')">
                        <div class="text-4xl font-bold t-primary-text mb-2 font-serif" id="cover-count-exh">0</div>
                        <div class="text-sm t-text-light font-medium tracking-widest">展覽紀錄</div>
                    </div>
                    <div class="t-card rounded-3xl p-6 border t-border cursor-pointer hover:-translate-y-1 transition-transform shadow-sm flex flex-col items-center" onclick="switchMainTab('spot')">
                        <div class="text-4xl font-bold t-primary-text mb-2 font-serif" id="cover-count-spot">0</div>
                        <div class="text-sm t-text-light font-medium tracking-widest">景點紀錄</div>
                    </div>
                    <div class="t-card rounded-3xl p-6 border t-border cursor-pointer hover:-translate-y-1 transition-transform shadow-sm flex flex-col items-center" onclick="switchMainTab('food')">
                        <div class="text-4xl font-bold t-primary-text mb-2 font-serif" id="cover-count-food">0</div>
                        <div class="text-sm t-text-light font-medium tracking-widest">美食紀錄</div>
                    </div>
                    <div class="t-card rounded-3xl p-6 border t-border cursor-pointer hover:-translate-y-1 transition-transform shadow-sm flex flex-col items-center" onclick="switchMainTab('store')">
                        <div class="text-4xl font-bold t-primary-text mb-2 font-serif" id="cover-count-store">0</div>
                        <div class="text-sm t-text-light font-medium tracking-widest">店家紀錄</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== 1. 展覽區塊 (Exhibitions) ==================== -->
        <div id="section-exh" class="hidden">
            <div id="exh-top-bar" class="flex justify-between items-center mb-8">
                <div class="flex t-card rounded-full p-1 border t-border">
                    <button id="exh-btn-list-view" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-primary shadow-sm" onclick="switchExhView('list')">清單</button>
                    <button id="exh-btn-cal-view" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-text-light hover:t-text" onclick="switchExhView('calendar')">行事曆</button>
                </div>
                <button onclick="showExhForm()" class="t-primary px-5 py-2.5 rounded-full shadow-sm flex items-center gap-2 hover:opacity-90 font-sans text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                    新增展覽
                </button>
            </div>
            <div id="exh-list-view" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
            <div id="exh-calendar-view" class="hidden space-y-6">
                <div class="t-card rounded-3xl p-6 border t-border">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changeMonth('exh', -1)" class="p-2 rounded-full hover:bg-black/5 transition-colors t-text-light hover:t-text"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg></button>
                        <h3 id="exh-calendar-title" class="text-lg font-medium tracking-wide"></h3>
                        <button onclick="changeMonth('exh', 1)" class="p-2 rounded-full hover:bg-black/5 transition-colors t-text-light hover:t-text"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg></button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center mb-2 t-text-light text-xs font-sans">
                        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                    </div>
                    <div id="exh-calendar-days" class="grid grid-cols-7 gap-1 text-center font-sans text-sm"></div>
                </div>
                <div class="t-card rounded-3xl p-6 border t-border">
                    <h4 id="exh-selected-date-title" class="text-md font-medium mb-4 pb-2 border-b t-border tracking-wide t-primary-text"></h4>
                    <div id="exh-date-events-list" class="space-y-3"></div>
                </div>
            </div>
            <div id="exh-form-view" class="hidden"></div>
            <div id="exh-detail-view" class="hidden"></div>
        </div>

        <!-- ==================== 2. 景點區塊 (Spots) ==================== -->
        <div id="section-spot" class="hidden">
            <div id="spot-top-bar" class="flex justify-between items-center mb-8">
                <div class="flex t-card rounded-full p-1 border t-border">
                    <button id="spot-btn-sort-default" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-primary shadow-sm" onclick="setSpotSort('default')">時間</button>
                    <button id="spot-btn-sort-region" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-text-light hover:t-text" onclick="setSpotSort('region')">地區</button>
                </div>
                <button onclick="showSpotForm()" class="t-primary px-5 py-2.5 rounded-full shadow-sm flex items-center gap-2 hover:opacity-90 font-sans text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                    新增景點
                </button>
            </div>
            <div id="spot-list-view" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
            <div id="spot-form-view" class="hidden"></div>
            <div id="spot-detail-view" class="hidden"></div>
        </div>

        <!-- ==================== 3. 美食區塊 (Food) ==================== -->
        <div id="section-food" class="hidden">
            <div id="food-top-bar" class="flex justify-between items-center mb-8">
                <div class="flex t-card rounded-full p-1 border t-border">
                    <button id="food-btn-sort-default" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-primary shadow-sm" onclick="setFoodSort('default')">時間</button>
                    <button id="food-btn-sort-region" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-text-light hover:t-text" onclick="setFoodSort('region')">地區</button>
                    <button id="food-btn-sort-category" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-text-light hover:t-text" onclick="setFoodSort('category')">分類</button>
                </div>
                <button onclick="showFoodForm()" class="t-primary px-5 py-2.5 rounded-full shadow-sm flex items-center gap-2 hover:opacity-90 font-sans text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                    新增美食
                </button>
            </div>
            <div id="food-list-view" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
            <div id="food-form-view" class="hidden"></div>
            <div id="food-detail-view" class="hidden"></div>
        </div>

        <!-- ==================== 4. 店家區塊 (Stores) ==================== -->
        <div id="section-store" class="hidden">
            <div id="store-top-bar" class="flex justify-between items-center mb-8">
                <div class="flex t-card rounded-full p-1 border t-border">
                    <button id="store-btn-sort-default" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-primary shadow-sm" onclick="setStoreSort('default')">時間</button>
                    <button id="store-btn-sort-region" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors t-text-light hover:t-text" onclick="setStoreSort('region')">地區</button>
                </div>
                <button onclick="showStoreForm()" class="t-primary px-5 py-2.5 rounded-full shadow-sm flex items-center gap-2 hover:opacity-90 font-sans text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                    新增店家
                </button>
            </div>
            <div id="store-list-view" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
            <div id="store-form-view" class="hidden"></div>
            <div id="store-detail-view" class="hidden"></div>
        </div>

    </div>

    <script>
        // 資料與狀態
        let exhibitions = JSON.parse(localStorage.getItem('exhibitions')) || [];
        let spots = JSON.parse(localStorage.getItem('spots')) || [];
        let foods = JSON.parse(localStorage.getItem('foods')) || [];
        let stores = JSON.parse(localStorage.getItem('stores')) || []; 
        
        let currentTab = 'cover';
        let spotSortType = 'default';
        let foodSortType = 'default';
        let storeSortType = 'default';
        
        let calState = { year: new Date().getFullYear(), month: new Date().getMonth(), selected: formatDate(new Date()) };

        // 行政區與地區清單
        const fullRegions = ['基隆', '台北', '新北', '桃園', '新竹', '苗栗', '台中', '彰化', '南投', '雲林', '嘉義', '台南', '高雄', '屏東', '台東', '花蓮', '宜蘭', '綠島', '蘭嶼', '澎湖', '金門', '國外'];
        
        // 美食專用地區順序
        const foodRegionsOrder = ['高雄', '台南', '台北', '新北', '台中', '屏東', '台東', '南投', '嘉義', '基隆', '桃園', '新竹', '苗栗', '彰化', '雲林', '花蓮', '宜蘭'];
        
        // 高雄行政區列表
        const kaohsiungDistricts = ["鹽埕區", "鼓山區", "左營區", "楠梓區", "三民區", "新興區", "前金區", "苓雅區", "前鎮區", "旗津區", "小港區", "鳳山區", "其他"];

        const foreignCountries = ['日本', '港澳', '馬來西亞', '其他'];
        const foodCategories = ['日式','中式','東南亞','港式','義式','火鍋','燒烤','其他'];

        window.onload = () => {
            switchMainTab('cover');
        };

        function switchMainTab(tab) {
            currentTab = tab;
            document.body.className = `t-bg min-h-screen t-text ${tab === 'spot' ? 'theme-spot' : tab === 'food' ? 'theme-food' : tab === 'store' ? 'theme-store' : ''}`;
            ['cover', 'exh', 'spot', 'food', 'store'].forEach(t => {
                const section = document.getElementById(`section-${t}`);
                if (section) section.classList.add('hidden');
                const btn = document.getElementById(`tab-${t}`);
                if (btn) btn.className = "whitespace-nowrap px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 t-text-light hover:t-text";
            });
            const activeSection = document.getElementById(`section-${tab}`);
            if (activeSection) activeSection.classList.remove('hidden');
            const activeBtn = document.getElementById(`tab-${tab}`);
            if (activeBtn) activeBtn.className = "whitespace-nowrap px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 t-primary shadow-sm";
            
            if (tab === 'cover') renderCover();
            else if (tab === 'exh') switchExhView('list');
            else if (tab === 'spot') switchSpotView('list');
            else if (tab === 'food') switchFoodView('list');
            else if (tab === 'store') switchStoreView('list');
        }

        // --- 0. 封面邏輯 ---
        function renderCover() {
            if(document.getElementById('cover-count-exh')) document.getElementById('cover-count-exh').innerText = exhibitions.length;
            if(document.getElementById('cover-count-spot')) document.getElementById('cover-count-spot').innerText = spots.length;
            if(document.getElementById('cover-count-food')) document.getElementById('cover-count-food').innerText = foods.length;
            if(document.getElementById('cover-count-store')) document.getElementById('cover-count-store').innerText = stores.length;
        }

        // --- 1. 展覽邏輯 (維持不變) ---
        function switchExhView(view) {
            document.getElementById('exh-list-view').classList.toggle('hidden', view !== 'list');
            document.getElementById('exh-calendar-view').classList.toggle('hidden', view !== 'calendar');
            document.getElementById('exh-form-view').classList.add('hidden');
            document.getElementById('exh-detail-view').classList.add('hidden');
            document.getElementById('exh-top-bar').classList.remove('hidden');
            if (view === 'list') renderExhList();
            else renderCalendar();
        }
        function renderExhList() {
            const container = document.getElementById('exh-list-view');
            container.innerHTML = exhibitions.length ? exhibitions.map(item => {
                const start = item.startDate ? item.startDate.replace(/-/g, '/') : '未定';
                const end = item.endDate ? item.endDate.replace(/-/g, '/') : '未定';
                const periodText = (item.startDate || item.endDate) ? `${start} - ${end}` : '未提供期間';
                const regionBadge = item.region ? `<span class="absolute top-3 right-3 px-2.5 py-0.5 rounded-full t-bg t-primary-text border t-border text-[10px] tracking-wider font-medium">${item.region}</span>` : '';
                return `
                <div class="t-card rounded-3xl p-6 cursor-pointer border t-border group relative overflow-hidden" onclick="showExhDetail('${item.id}')">
                    <div class="absolute top-0 left-0 w-1 h-full t-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    ${regionBadge}
                    <h3 class="text-lg font-medium mb-1 font-serif pr-16">${item.name}</h3>
                    <p class="text-sm t-text-light mb-1 flex items-center gap-1.5">${item.location || '未知地點'}</p>
                    <p class="text-[11px] t-text-light flex items-center gap-1.5">${periodText}</p>
                </div>
            `}) : '<div class="col-span-full py-10 text-center t-text-light">尚無紀錄</div>';
        }
        function showExhForm(id = null) {
            const item = id ? exhibitions.find(e => e.id === id) : {};
            document.getElementById('exh-top-bar').classList.add('hidden');
            document.getElementById('exh-list-view').classList.add('hidden');
            document.getElementById('exh-calendar-view').classList.add('hidden');

                        </div>
                        <div><label class="block mb-1 t-text-light">地址</label><input type="text" id="f-addr" value="${item.address || ''}" class="w-full p-3 rounded-2xl bg-white border t-border t-ring" placeholder="詳細地址"></div>
                        <div><label class="block mb-1 t-text-light">備註</label><textarea id="f-notes" class="w-full p-3 rounded-2xl bg-white border t-border t-ring h-32 resize-none" placeholder="心得與推薦...">${item.notes || ''}</textarea></div>
                        <button type="submit" class="w-full t-primary py-3 rounded-full mt-2 font-medium shadow-sm">儲存紀錄</button>
                    </form>
                </div>
            `;
        }
        function toggleFoodDistrict(val) {
            const container = document.getElementById('food-district-container');
            if (val === '高雄') container.classList.remove('hidden');
            else { container.classList.add('hidden'); if(document.getElementById('f-dist')) document.getElementById('f-dist').value = ""; }
        }
        function saveFood(e, id) {
            e.preventDefault();
            const data = { 
                id: id || Date.now().toString(), 
                name: v('f-name'), 
                region: v('f-reg'), 
                district: document.getElementById('f-reg').value === '高雄' ? v('f-dist') : '', 
                category: v('f-cat'), 
                hours: v('f-hours'), 
                closed: v('f-closed'), 
                phone: v('f-phone'), 
                address: v('f-addr'), 
                video: v('f-vid'), 
                notes: v('f-notes') 
            };
            if (id) foods = foods.map(i => i.id === id ? data : i); else foods.push(data);
            localStorage.setItem('foods', JSON.stringify(foods));
            switchFoodView('list');
        }
        function showFoodDetail(id) {
            const item = foods.find(f => f.id === id);
            document.getElementById('food-top-bar').classList.add('hidden');
            document.getElementById('food-list-view').classList.add('hidden');
            document.getElementById('food-form-view').classList.add('hidden');
            const view = document.getElementById('food-detail-view');
            view.classList.remove('hidden');
            const fullRegion = item.region === '高雄' && item.district ? `高雄 / ${item.district}` : (item.region || '未選');
            view.innerHTML = `
                <button onclick="switchFoodView('list')" class="mb-6 t-text-light text-sm flex items-center gap-2">← 返回列表</button>
                <div class="t-card rounded-3xl p-8 border t-border">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-2xl font-bold font-serif tracking-wide">${item.name}</h2>
                        <div class="flex gap-2"><button onclick="showFoodForm('${id}')" class="p-2 t-text-light">編輯</button><button onclick="del('food','${id}')" class="p-2 text-red-400">刪除</button></div>
                    </div>
                    <div class="space-y-4 text-sm font-sans leading-relaxed">
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">名稱</span><span class="font-medium">${item.name}</span></div>
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">地區</span><span>${fullRegion}</span></div>
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">分類</span><span>${item.category || '未分類'}</span></div>
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">營業時間</span><span>${item.hours || '未提供'}</span></div>
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">公休日</span><span>${item.closed || '未提供'}</span></div>
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">電話</span><span>${item.phone || '未提供'}</span></div>
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">地址</span><span>${item.address || '未提供'}</span></div>
                        <div class="flex gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">影片</span>${item.video ? `<a href="${item.video}" target="_blank" class="text-blue-500 underline break-all">${item.video}</a>` : '<span>未提供</span>'}</div>
                        <div class="mt-6"><span class="block t-text-light mb-2 font-medium">備註</span><div class="p-4 bg-white/40 rounded-2xl border t-border whitespace-pre-wrap">${item.notes || '尚無紀錄'}</div></div>
                    </div>
                </div>
            `;
        }

        // --- 4. 店家邏輯 ---
        function switchStoreView(view) {
            document.getElementById('store-list-view').classList.toggle('hidden', view !== 'list');
            document.getElementById('store-form-view').classList.add('hidden');
            document.getElementById('store-detail-view').classList.add('hidden');
            document.getElementById('store-top-bar').classList.remove('hidden');
            if (view === 'list') renderStoreList();
        }

        function setStoreSort(type) { storeSortType = type; renderStoreList(); }

        function renderStoreList() {
            const container = document.getElementById('store-list-view');
            let data = [...stores];
            if (storeSortType === 'region') data.sort((a, b) => fullRegions.indexOf(a.region) - fullRegions.indexOf(b.region));
            else data.sort((a, b) => b.id - a.id);
            container.innerHTML = data.length ? data.map(item => {
                const regionDisplay = (item.region === '國外' && item.country) ? `國外 / ${item.country}` : (item.region || '未選');
                return `
                <div class="t-card rounded-3xl p-6 cursor-pointer border t-border group relative overflow-hidden" onclick="showStoreDetail('${item.id}')">
                    <div class="absolute top-0 left-0 w-1 h-full t-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <span class="absolute top-3 right-3 px-2.5 py-0.5 rounded-full t-bg t-primary-text border t-border text-[10px] tracking-wider font-medium">${regionDisplay}</span>
                    <h3 class="text-lg font-medium font-serif mt-2 pr-16">${item.name}</h3>
                    <p class="text-[11px] t-text-light mt-1 flex items-center gap-1.5 italic">${item.hours || '未提供營業時間'}</p>
                </div>
            `}) : '<div class="col-span-full py-10 text-center t-text-light">尚無店家紀錄</div>';
            
            document.getElementById('store-btn-sort-default').className = `px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${storeSortType === 'default' ? 't-primary shadow-sm' : 't-text-light'}`;
            document.getElementById('store-btn-sort-region').className = `px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${storeSortType === 'region' ? 't-primary shadow-sm' : 't-text-light'}`;
        }

        function showStoreForm(id = null) {
            const item = id ? stores.find(s => s.id === id) : {};
            document.getElementById('store-top-bar').classList.add('hidden');
            document.getElementById('store-list-view').classList.add('hidden');
            document.getElementById('store-detail-view').classList.add('hidden');
            const view = document.getElementById('store-form-view');
            view.classList.remove('hidden');
            
            view.innerHTML = `
                <button onclick="switchStoreView('list')" class="mb-6 t-text-light text-sm flex items-center gap-2">← 返回列表</button>
                <div class="t-card rounded-3xl p-8 border t-border">
                    <h2 class="text-xl font-medium mb-6">${id ? '編輯' : '新增'}店家</h2>
                    <form onsubmit="saveStore(event, '${id || ''}')" class="space-y-4 text-sm font-sans">
                        <div>
                            <label class="block mb-1 t-text-light">店名</label>
                            <input type="text" id="st-name" required value="${item.name || ''}" class="w-full p-3 rounded-2xl bg-white border t-border t-ring" placeholder="輸入店家名稱">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block mb-1 t-text-light">地區</label>
                                <select id="st-reg" onchange="toggleStoreForeign(this.value)" class="w-full p-3 rounded-2xl bg-white border t-border t-ring custom-select">
                                    <option value="">選擇地區</option>
                                    ${fullRegions.map(r => `<option value="${r}" ${item.region === r ? 'selected' : ''}>${r}</option>`).join('')}
                                </select>
                            </div>
                            <div id="store-foreign-container" class="${item.region === '國外' ? '' : 'hidden'} animate-in fade-in">
                                <label class="block mb-1 t-text-light">國家/地區</label>
                                <select id="st-country" class="w-full p-3 rounded-2xl bg-white border t-border t-ring custom-select">
                                    <option value="">選擇國家</option>
                                    ${foreignCountries.map(c => `<option value="${c}" ${item.country === c ? 'selected' : ''}>${c}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block mb-1 t-text-light">營業時間</label>
                            <input type="text" id="st-hours" value="${item.hours || ''}" class="w-full p-3 rounded-2xl bg-white border t-border t-ring" placeholder="如：10:00 - 22:00">
                        </div>
                        <div>
                            <label class="block mb-1 t-text-light">詳細地址</label>
                            <input type="text" id="st-addr" value="${item.address || ''}" class="w-full p-3 rounded-2xl bg-white border t-border t-ring" placeholder="輸入詳細地址">
                        </div>
                        <div>
                            <label class="block mb-1 t-text-light">影片連結</label>
                            <input type="url" id="st-vid" value="${item.video || ''}" class="w-full p-3 rounded-2xl bg-white border t-border t-ring" placeholder="介紹影片網址">
                        </div>
                        <div>
                            <label class="block mb-1 t-text-light">備註</label>
                            <textarea id="st-notes" class="w-full p-3 rounded-2xl bg-white border t-border t-ring h-32 resize-none" placeholder="店家特色或個人備註...">${item.notes || ''}</textarea>
                        </div>
                        <button type="submit" class="w-full t-primary py-3 rounded-full mt-2 font-medium shadow-sm">儲存紀錄</button>
                    </form>
                </div>
            `;
        }

        function toggleStoreForeign(val) {
            const container = document.getElementById('store-foreign-container');
            if (val === '國外') container.classList.remove('hidden');
            else { 
                container.classList.add('hidden'); 
                if(document.getElementById('st-country')) document.getElementById('st-country').value = ""; 
            }
        }

        function saveStore(e, id) {
            e.preventDefault();
            const data = { 
                id: id || Date.now().toString(), 
                name: v('st-name'), 
                region: v('st-reg'), 
                country: document.getElementById('st-reg').value === '國外' ? v('st-country') : '', 
                hours: v('st-hours'),
                address: v('st-addr'), 
                video: v('st-vid'),
                notes: v('st-notes') 
            };
            if (id) stores = stores.map(i => i.id === id ? data : i); else stores.push(data);
            localStorage.setItem('stores', JSON.stringify(stores));
            switchStoreView('list');
        }

        function showStoreDetail(id) {
            const item = stores.find(s => s.id === id);
            document.getElementById('store-top-bar').classList.add('hidden');
            document.getElementById('store-list-view').classList.add('hidden');
            document.getElementById('store-form-view').classList.add('hidden');
            const view = document.getElementById('store-detail-view');
            view.classList.remove('hidden');
            
            const fullRegion = (item.region === '國外' && item.country) ? `國外 (${item.country})` : (item.region || '未選');

            view.innerHTML = `
                <button onclick="switchStoreView('list')" class="mb-6 t-text-light text-sm flex items-center gap-2">← 返回列表</button>
                <div class="t-card rounded-3xl p-8 border t-border">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-2xl font-bold font-serif tracking-wide">${item.name}</h2>
                        <div class="flex gap-2"><button onclick="showStoreForm('${id}')" class="p-2 t-text-light hover:t-text transition-colors">編輯</button><button onclick="del('store','${id}')" class="p-2 text-red-400 hover:text-red-600 transition-colors">刪除</button></div>
                    </div>
                    <div class="space-y-4 text-sm font-sans leading-relaxed">
                        <div class="flex items-start gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">店名</span><span class="font-medium">${item.name}</span></div>
                        <div class="flex items-start gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">地區</span><span>${fullRegion}</span></div>
                        <div class="flex items-start gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">營業時間</span><span>${item.hours || '未提供'}</span></div>
                        <div class="flex items-start gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">地址</span><span>${item.address || '未提供'}</span></div>
                        <div class="flex items-start gap-4 py-2 border-b t-border"><span class="t-text-light w-24 shrink-0 font-medium">影片</span>${item.video ? `<a href="${item.video}" target="_blank" class="text-blue-500 underline break-all">${item.video}</a>` : '<span>未提供</span>'}</div>
                        <div class="mt-6"><span class="block t-text-light mb-2 font-medium">備註</span><div class="p-4 bg-white/40 rounded-2xl border t-border whitespace-pre-wrap">${item.notes || '尚無紀錄'}</div></div>
                    </div>
                </div>
            `;
        }

        // --- 通用工具 ---
        function v(id) { return document.getElementById(id) ? document.getElementById(id).value : ""; }
        function del(type, id) {
            if (!confirm('確定要永久刪除此紀錄嗎？')) return;
            if (type === 'exh') exhibitions = exhibitions.filter(e => e.id !== id);
            else if (type === 'spot') spots = spots.filter(s => s.id !== id);
            else if (type === 'food') foods = foods.filter(f => f.id !== id);
            else if (type === 'store') stores = stores.filter(s => s.id !== id);
            localStorage.setItem(`${type}s`, JSON.stringify(eval(`${type === 'exh' ? 'exhibitions' : type + 's'}`)));
            if (type === 'exh') switchExhView('list');
            else if (type === 'spot') switchSpotView('list');
            else if (type === 'food') switchFoodView('list');
            else if (type === 'store') switchStoreView('list');
        }
        function formatDate(d) { let m = d.getMonth()+1, day = d.getDate(); return `${d.getFullYear()}-${m < 10 ? '0'+m : m}-${day < 10 ? '0'+day : day}`; }

        function changeMonth(type, delta) { calState.month += delta; if (calState.month < 0) { calState.month = 11; calState.year--; } else if (calState.month > 11) { calState.month = 0; calState.year++; } renderCalendar(); }
        function renderCalendar() {
            const firstDay = new Date(calState.year, calState.month, 1).getDay();
            const daysInMonth = new Date(calState.year, calState.month + 1, 0).getDate();
            const title = document.getElementById('exh-calendar-title');
            if (title) title.innerText = `${calState.year}年 ${calState.month + 1}月`;
            const container = document.getElementById('exh-calendar-days');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < firstDay; i++) container.appendChild(document.createElement('div'));
            for (let i = 1; i <= daysInMonth; i++) {
                const d = formatDate(new Date(calState.year, calState.month, i));
                const has = exhibitions.some(e => (e.startDate <= d && e.endDate >= d) || e.startDate === d);
                const isS = d === calState.selected;
                const div = document.createElement('div');
                div.className = `p-2 rounded-xl cursor-pointer transition-colors ${isS ? 't-primary text-white shadow-sm' : 'hover:bg-white/50'}`;
                div.onclick = () => { calState.selected = d; renderCalendar(); };
                div.innerHTML = `<span>${i}</span>${has ? `<div class="w-1 h-1 mx-auto mt-0.5 rounded-full ${isS?'bg-white':'t-primary'}"></div>`:''}`;
                container.appendChild(div);
            }
            renderDateEvents(calState.selected);
        }
        function renderDateEvents(date) {
            const events = exhibitions.filter(e => (e.startDate <= date && e.endDate >= date) || e.startDate === date);
            const title = document.getElementById('exh-selected-date-title');
            if (title) title.innerText = date.replace(/-/g, '/') + ' 的活動';
            const list = document.getElementById('exh-date-events-list');
            if (list) list.innerHTML = events.length ? events.map(e => `<div class="p-4 bg-white/50 rounded-2xl border t-border cursor-pointer transition-shadow hover:shadow-sm" onclick="showExhDetail('${e.id}')">${e.name}</div>`).join('') : '<p class="text-xs t-text-light text-center py-4">本日無紀錄</p>';
        }
    </script>
</body>
</html>
